name: Docker Builds + Docker Hub Upload

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build'
        required: true
        type: choice
        options:
          - php-84
          - php-85
          - screenshots
          - all
      target:
        description: 'Target stage (ignored for screenshots)'
        required: true
        type: choice
        options:
          - all
          - prod
          - dev
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-php-84:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.inputs.image == 'php-84' ||
      github.event.inputs.image == 'all'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            target: production
            suffix: prod
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            target: production
            suffix: prod
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            target: dev
            suffix: dev
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            target: dev
            suffix: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date tag
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "tag=$(date -u +'%Y.%W')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dfox288/partymeister-php-84-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.date.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push by digest
        uses: nick-fields/retry@v3
        env:
          BUILDX_LABELS: ${{ steps.meta.outputs.labels }}
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            LABEL_ARGS=()
            while IFS= read -r line; do
              [ -n "$line" ] && LABEL_ARGS+=(--label "$line")
            done <<< "$BUILDX_LABELS"

            docker buildx build \
              --platform "${{ matrix.platform }}" \
              --target "${{ matrix.target }}" \
              --output "type=image,name=dfox288/partymeister-php-84-${{ matrix.suffix }},push-by-digest=true,name-canonical=true,push=true" \
              --metadata-file "$RUNNER_TEMP/build-metadata.json" \
              --file php-84/Dockerfile \
              "${LABEL_ARGS[@]}" \
              php-84

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest=$(jq -r '."containerimage.digest"' "$RUNNER_TEMP/build-metadata.json")
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: php-84-${{ matrix.suffix }}-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-php-84:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.inputs.image == 'php-84' ||
      github.event.inputs.image == 'all'
    runs-on: ubuntu-latest
    needs: build-php-84
    strategy:
      matrix:
        include:
          - suffix: prod
          - suffix: dev
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: php-84-${{ matrix.suffix }}-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate date tag
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "tag=$(date -u +'%Y.%W')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dfox288/partymeister-php-84-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.date.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'dfox288/partymeister-php-84-${{ matrix.suffix }}@sha256:%s ' *)

  build-php-85:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.inputs.image == 'php-85' ||
      github.event.inputs.image == 'all'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            target: production
            suffix: prod
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            target: production
            suffix: prod
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            target: dev
            suffix: dev
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            target: dev
            suffix: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date tag
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "tag=$(date -u +'%Y.%W')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dfox288/partymeister-php-85-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.date.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push by digest
        uses: nick-fields/retry@v3
        env:
          BUILDX_LABELS: ${{ steps.meta.outputs.labels }}
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            LABEL_ARGS=()
