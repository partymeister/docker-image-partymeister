              --metadata-file "$RUNNER_TEMP/build-metadata.json" \
              --file php-85/Dockerfile \
              "${LABEL_ARGS[@]}" \
              php-85

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest=$(jq -r '."containerimage.digest"' "$RUNNER_TEMP/build-metadata.json")
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: php-85-${{ matrix.suffix }}-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-php-85:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.inputs.image == 'php-85' ||
      github.event.inputs.image == 'all'
    runs-on: ubuntu-latest
    needs: build-php-85
    strategy:
      matrix:
        include:
          - suffix: prod
          - suffix: dev
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: php-85-${{ matrix.suffix }}-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate date tag
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "tag=$(date -u +'%Y.%W')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dfox288/partymeister-php-85-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.date.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
