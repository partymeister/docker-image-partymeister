name: Docker Builds + Docker Hub Upload

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build'
        required: true
        type: choice
        options:
          - php-84
          - php-85
          - screenshots
          - all
      target:
        description: 'Target stage (ignored for screenshots)'
        required: true
        type: choice
        options:
          - all
          - prod
          - dev
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-php-84:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.inputs.image == 'php-84' ||
      github.event.inputs.image == 'all'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: production
            suffix: prod
          - target: dev
            suffix: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date tag
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "tag=$(date -u +'%Y.%W')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dfox288/partymeister-php-84-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.date.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: php-84
          file: php-84/Dockerfile
          platforms: linux/amd64,linux/arm64
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-php-85:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.inputs.image == 'php-85' ||
      github.event.inputs.image == 'all'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: production
            suffix: prod
          - target: dev
            suffix: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date tag
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "tag=$(date -u +'%Y.%W')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dfox288/partymeister-php-85-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.date.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: php-85
          file: php-85/Dockerfile
          platforms: linux/amd64,linux/arm64
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-screenshots:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event.inputs.image == 'screenshots' ||
      github.event.inputs.image == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date tag
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        id: date
        run: echo "tag=$(date -u +'%Y.%W')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dfox288/partymeister-screenshots-base
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.date.outputs.tag }},enable=${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: screenshots
          file: screenshots/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
